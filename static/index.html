<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Softball Rules</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #16213e;
            padding: 16px;
            text-align: center;
            border-bottom: 2px solid #e94560;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1.3rem;
            color: #e94560;
            letter-spacing: 0.5px;
        }

        header p {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #e94560;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-bottom-left-radius: 4px;
        }

        .message.assistant strong {
            color: #e94560;
        }

        .message.assistant p { margin-bottom: 8px; }
        .message.assistant p:last-child { margin-bottom: 0; }

        .thinking {
            align-self: flex-start;
            color: #888;
            font-style: italic;
            padding: 12px 16px;
        }

        .thinking::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        #input-area {
            flex-shrink: 0;
            padding: 12px;
            background: #16213e;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 8px;
        }

        #question {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #2a2a4a;
            border-radius: 24px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
        }

        #question:focus {
            border-color: #e94560;
        }

        #question::placeholder {
            color: #666;
        }

        #send {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: #e94560;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .welcome {
            text-align: center;
            color: #888;
            margin-top: 40%;
            padding: 0 20px;
        }

        .welcome h2 {
            color: #e94560;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .welcome p {
            font-size: 0.85rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <header>
        <h1>Softball Rules Assistant</h1>
        <p>AA-League (10U) &middot; Supplementary + USSSA Rules</p>
    </header>

    <div id="chat">
        <div class="welcome">
            <h2>Ask a rules question</h2>
            <p>Try: "How many runs can a team score per inning?"<br>
               or "Can a runner steal on a dropped third strike?"</p>
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="question" placeholder="Ask a rules question..." autocomplete="off">
        <button id="send">&#9654;</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('question');
        const sendBtn = document.getElementById('send');
        let firstQuestion = true;

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'assistant') {
                div.innerHTML = formatMarkdown(text);
            } else {
                div.textContent = text;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function formatMarkdown(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n- /g, '<br>- ')
                .replace(/\n/g, '<br>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>');
        }

        function showThinking() {
            const div = document.createElement('div');
            div.className = 'thinking';
            div.textContent = 'Looking up the rules';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function askQuestion() {
            const question = input.value.trim();
            if (!question) return;

            if (firstQuestion) {
                const welcome = chat.querySelector('.welcome');
                if (welcome) welcome.remove();
                firstQuestion = false;
            }

            input.value = '';
            sendBtn.disabled = true;

            addMessage(question, 'user');
            const thinking = showThinking();

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question }),
                });
                const data = await res.json();
                thinking.remove();
                addMessage(data.answer, 'assistant');
            } catch (err) {
                thinking.remove();
                addMessage('Sorry, something went wrong. Please try again.', 'assistant');
            }

            sendBtn.disabled = false;
            input.focus();
        }

        sendBtn.addEventListener('click', askQuestion);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') askQuestion();
        });

        input.focus();
    </script>
</body>
</html>
